<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>總務部設備資料管理系統</title>
    <style>
        :root { 
            --primary: #1a73e8; 
            --hover: #1557b0; 
            --text: #1e293b;
            --text-light: #64748b;
            --border: rgba(226, 232, 240, 0.8);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            line-height: 1.6; 
            padding: 40px 20px; 
            max-width: 1200px; 
            margin: auto; 
            color: var(--text); 
            background-color: #f0f9ff;
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 100%), 
                              url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%237dd3fc' fill-opacity='0.25'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            background-attachment: fixed;
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); 
            margin-bottom: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        .hidden { display: none !important; }
        
        h1 { color: var(--primary); text-align: center; font-size: 2.25rem; font-weight: 700; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(255,255,255,0.5); }
        .subtitle { text-align: center; color: var(--text-light); margin-bottom: 35px; font-weight: 500;}
        h2 { font-size: 1.5rem; font-weight: 600; margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block;}
        h3 { font-size: 1.2rem; font-weight: 600; margin-top: 10px; margin-bottom: 10px; color: var(--text); }
        
        button { 
            background: var(--primary); color: white; border: none; padding: 12px 26px; 
            cursor: pointer; border-radius: 8px; font-size: 16px; font-weight: 500;
            transition: all 0.2s ease; box-shadow: 0 4px 6px -1px rgba(26, 115, 232, 0.1);
        }
        button:hover:not(:disabled) { background: var(--hover); transform: translateY(-1px); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        button.btn-secondary { background: #64748b; }
        button.btn-secondary:hover:not(:disabled) { background: #475569; }
        button.btn-success { background: #10b981; }
        button.btn-success:hover:not(:disabled) { background: #059669; }
        
        input[type="text"], input[type="password"], input[type="date"], input[type="number"], select, textarea { 
            padding: 10px 14px; width: 100%; max-width: 100%; border: 1px solid var(--border); 
            border-radius: 8px; margin-bottom: 15px; font-size: 15px; background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box; font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15); background: #fff;}
        input:disabled { background: #f1f5f9; color: var(--text-light); cursor: not-allowed; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; text-align: left;}
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: var(--text); font-size: 0.95em;}
        
        .data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed var(--border); }
        .data-row:last-child { border-bottom: none; }
        .data-label { font-weight: 600; color: var(--text-light); width: 30%;}
        .data-value { font-weight: 500; width: 70%; text-align: right;}
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.85em; font-weight: 600; white-space: nowrap; }
        .status-normal { background: #dcfce7; color: #166534; }
        .status-maintenance { background: #fef3c7; color: #b45309; }
        .status-scrapped { background: #fee2e2; color: #b91c1c; }

        .search-box { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .search-box input { margin-bottom: 0; max-width: 300px; }

        .table-responsive { overflow-x: auto; width: 100%; border-radius: 8px; box-shadow: 0 0 0 1px var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; background: rgba(255,255,255,0.9); min-width: 1200px; }
        th { padding: 12px 10px; border-bottom: 2px solid var(--primary); background: rgba(241, 245, 249, 0.9); color: var(--text); text-align: left; font-weight: 600; white-space: nowrap; }
        td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover td { background: #f8fbff; }
        
        .nowrap { white-space: nowrap; }
        .truncate-text { max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; vertical-align: middle; cursor: help; }
    </style>
</head>
<body>
    <img src="https://www.cpttm.org.mo/t/cpttm-30th-logo-ca.png" alt="CPTTM Logo" style="max-width: 200px; margin: 0 auto 20px auto; display: block;">
    <h1>總務部設備資料系統</h1>
    <div class="subtitle">Asset Management Portal</div>

    <div id="role-section" class="card" style="text-align: center;">
        <h2>請選擇您的操作身分</h2>
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 25px;">
            <button onclick="showSection('staff-query-section')">員工 (查詢設備)</button>
            <button onclick="showSection('admin-login-section')" class="btn-success">管理員 (管理/維護)</button>
        </div>
    </div>

    <div id="admin-login-section" class="card hidden" style="text-align: center;">
        <h2>管理員登入</h2>
        <div style="max-width: 300px; margin: 0 auto;">
            <input type="text" id="admin-username" placeholder="管理員帳號">
            <input type="password" id="admin-password" placeholder="管理員密碼" onkeypress="if(event.keyCode===13) verifyAdminLogin()">
            <button onclick="verifyAdminLogin()" style="width: 100%; margin-bottom: 10px;">登入</button>
            <button onclick="location.reload()" class="btn-secondary" style="width: 100%;">返回首頁</button>
        </div>
    </div>

    <div id="admin-dashboard-section" class="card hidden" style="text-align: center;">
        <h2>管理員控制台</h2>
        <div style="display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 30px; margin-bottom: 30px;">
            <button onclick="showSection('admin-manage-section'); clearForm();" style="padding: 15px 30px; font-size: 16px;">📝 新增 / 編輯特定設備</button>
            <button onclick="showSection('admin-overview-section'); loadOverview(1);" class="btn-success" style="padding: 15px 30px; font-size: 16px;">📊 設備總覽與搜尋</button>
            <button onclick="showSection('admin-io-section');" style="background: #eab308; color: #1e293b; padding: 15px 30px; font-size: 16px;">💾 數據匯入 / 匯出</button>
        </div>
        <button onclick="location.reload()" class="btn-secondary">登出返回首頁</button>
    </div>

    <div id="admin-io-section" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">數據匯入與匯出</h2>
            <button onclick="showSection('admin-dashboard-section')" class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">返回控制台</button>
        </div>

        <h3>1. 批次匯入設備資料 (CSV 格式)</h3>
        <p style="font-size: 0.9em; color: var(--text-light); margin-bottom: 15px;">
            請下載下方的範本填寫。欄位順序必須完全一致：<br>
            <strong>資產碼, 設備名稱, 資產性質, 設備狀態, 設備地點, 保管人, 採購單號, 資產價值, 採購日期, 保修到期日, 預計更換日期, 備註</strong>
        </p>
        
        <button onclick="downloadAssetTemplate()" style="background: #0ea5e9; box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.15); margin-bottom: 20px; font-size: 0.9em; padding: 10px 18px;">📥 下載 CSV 匯入範本</button>
        <br>

        <input type="file" id="csv-file" accept=".csv,text/csv" style="margin-bottom: 10px;"><br>
        <div id="import-status" style="margin-top: 8px; margin-bottom: 12px; font-size: 0.92em; font-weight: bold;"></div>
        <button onclick="importAssets()" id="btn-import" class="btn-success">上傳並匯入至 NocoDB</button>
        
        <hr style="margin: 35px 0; border: 0; border-top: 1px solid var(--border);">
        
        <h3>2. 備份 / 匯出所有設備資料</h3>
        <button onclick="exportAssets()" id="btn-export" style="background: #eab308; color: #1e293b; box-shadow: 0 4px 6px -1px rgba(234, 179, 8, 0.15);">📤 下載完整 CSV 設備清單</button>
    </div>

    <div id="admin-overview-section" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">設備總覽清單</h2>
            <button onclick="showSection('admin-dashboard-section')" class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">返回控制台</button>
        </div>

        <div class="search-box" style="justify-content: flex-start; margin-bottom: 20px;">
            <input type="text" id="overview-search-keyword" placeholder="搜尋關鍵字 (資產碼/名稱/地點/保管人)..." style="max-width: 400px;" onkeypress="if(event.keyCode===13) loadOverview(1)">
            <button onclick="loadOverview(1)">搜尋</button>
            <button onclick="document.getElementById('overview-search-keyword').value=''; loadOverview(1)" class="btn-secondary">清除</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>資產碼</th>
                        <th>設備名稱</th>
                        <th>資產性質</th>
                        <th style="text-align: center;">狀態</th>
                        <th>設備地點</th>
                        <th>保管人/部門</th>
                        <th>採購單號</th>
                        <th>價值(MOP)</th>
                        <th>採購日期</th>
                        <th>更換日期</th>
                        <th>備註</th>
                        <th>資料更新日期</th>
                        <th style="text-align: center; position: sticky; right: 0; background: rgba(241, 245, 249, 1); z-index: 1;">操作</th>
                    </tr>
                </thead>
                <tbody id="overview-tbody"></tbody>
            </table>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <span id="overview-page-info" style="color: var(--text-light); font-size: 14px; font-weight: 500;"></span>
            <div style="display: flex; gap: 10px;">
                <button id="btn-prev-page" onclick="loadOverview(currentPage - 1)" class="btn-secondary" style="padding: 8px 14px; font-size: 14px;">上一頁</button>
                <button id="btn-next-page" onclick="loadOverview(currentPage + 1)" class="btn-secondary" style="padding: 8px 14px; font-size: 14px;">下一頁</button>
            </div>
        </div>
    </div>

    <div id="admin-manage-section" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">設備資料維護</h2>
            <button onclick="showSection('admin-dashboard-section')" class="btn-secondary" style="padding: 8px 16px; font-size: 14px;">返回控制台</button>
        </div>
        
        <div class="search-box" style="justify-content: flex-start; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
            <input type="text" id="admin-search-code" placeholder="輸入資產碼進行查詢...">
            <button onclick="queryAsset('admin')">搜尋編輯</button>
            <button onclick="clearForm()" class="btn-success">清除表單(準備新增)</button>
        </div>

        <div id="admin-form-container">
            <input type="hidden" id="form-record-id">
            <div class="form-grid">
                <div class="form-group"><label>資產碼 (必填)</label><input type="text" id="f-code" required></div>
                <div class="form-group"><label>設備名稱</label><input type="text" id="f-name"></div>
                
                <div class="form-group"><label>資產性質</label>
                    <select id="f-type">
                        <option value="IT設備">IT設備 (電腦/伺服器等)</option>
                        <option value="辦公傢俱">辦公傢俱 (桌椅/鐵櫃等)</option>
                        <option value="電器設備">電器設備 (冷氣/冰箱等)</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group"><label>設備狀態</label>
                    <select id="f-status">
                        <option value="正常">正常使用</option>
                        <option value="維修中">維修中</option>
                        <option value="閒置">閒置庫存</option>
                        <option value="報廢">已報廢</option>
                    </select>
                </div>
                
                <div class="form-group"><label>設備地點</label><input type="text" id="f-location"></div>
                <div class="form-group"><label>保管人/部門</label><input type="text" id="f-custodian"></div>
                
                <div class="form-group"><label>採購單號</label><input type="text" id="f-po"></div>
                <div class="form-group"><label>資產價值 (MOP)</label><input type="number" id="f-value"></div>

                <div class="form-group"><label>採購日期</label><input type="date" id="f-purchase-date"></div>
                <div class="form-group"><label>保修到期日</label><input type="date" id="f-warranty-date"></div>
                
                <div class="form-group"><label>預計更換日期</label><input type="date" id="f-replace-date"></div>
                <div class="form-group"><label>最後更新時間</label><input type="text" id="f-last-updated" disabled></div>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>備註 / 維修保養紀錄</label>
                <textarea id="f-notes" rows="3"></textarea>
            </div>
            
            <div style="text-align: right; margin-top: 20px;">
                <span id="save-msg" style="margin-right: 15px; font-weight: bold;"></span>
                <button onclick="saveAsset()" id="btn-save" class="btn-success">儲存資料</button>
            </div>
        </div>
    </div>

    <div id="staff-query-section" class="card hidden">
        <h2 style="display: block; text-align: center;">設備資訊查詢</h2>
        <div class="search-box">
            <input type="text" id="staff-search-code" placeholder="請輸入或掃描資產碼 (如: AST-001)" onkeypress="if(event.keyCode===13) queryAsset('staff')">
            <button onclick="queryAsset('staff')">查詢</button>
        </div>
        <div id="staff-result" class="hidden" style="margin-top: 20px; background: rgba(255,255,255,0.6); padding: 20px; border-radius: 10px; border: 1px solid var(--border);"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button onclick="location.reload()" class="btn-secondary">返回首頁</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ NocoDB 配置區 (需替換為您的環境變數)
        // ==========================================
        const NOCODB_CONFIG = {
            apiToken: "nc_pat_Z5MNO9hzgUDKsIDfqy5ccS3LOw7lzkvovO9H6WqA",
            baseId: "ptt53c7497ked0y",
            apiRoot: "https://app.nocodb.com/api/v2/tables",
            tables: {
                assets: "您的_Assets_Table_ID",  // ❗請修改為設備資料表ID
                admins: "m3nu7sff2uh24rm"        // 管理員資料表ID
            }
        };

        let currentPage = 1;
        const PAGE_SIZE = 50;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const scanCode = urlParams.get('code');
            if(scanCode) {
                showSection('staff-query-section');
                document.getElementById('staff-search-code').value = scanCode;
                queryAsset('staff');
            }
        };

        // 取得當地時間格式 (YYYY-MM-DD HH:mm:ss)
        function getCurrentTimeStr() {
            const now = new Date();
            const pad = n => n.toString().padStart(2, '0');
            return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }

        async function nocoApi(method, tableId, query = "", body = null) {
            const url = `${NOCODB_CONFIG.apiRoot}/${tableId}/records${query}`;
            const options = {
                method: method,
                headers: { 'xc-token': NOCODB_CONFIG.apiToken, 'Content-Type': 'application/json' }
            };
            if (body) options.body = JSON.stringify(body);
            
            const response = await fetch(url, options);
            const text = await response.text();
            let data = {};
            if (text) { try { data = JSON.parse(text); } catch (e) {} }
            if (!response.ok) throw new Error(`API 錯誤: ${data.msg || "伺服器異常"}`);
            return data;
        }

        async function nocoInsertMany(tableId, rows) {
            if (!rows.length) return;
            await nocoApi('POST', tableId, "", rows);
        }

        function showSection(id) {
            ['role-section', 'admin-login-section', 'staff-query-section', 'admin-dashboard-section', 'admin-manage-section', 'admin-overview-section', 'admin-io-section'].forEach(sec => {
                const el = document.getElementById(sec);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        async function verifyAdminLogin() {
            const user = document.getElementById('admin-username').value.trim();
            const pwd = document.getElementById('admin-password').value;
            if (!user || !pwd) return alert("請輸入完整的帳號與密碼！");

            try {
                const queryFilter = `?where=(username,eq,${encodeURIComponent(user)})~and(password,eq,${encodeURIComponent(pwd)})`;
                const res = await nocoApi('GET', NOCODB_CONFIG.tables.admins, queryFilter);
                if (res.list && res.list.length > 0) {
                    showSection('admin-dashboard-section');
                } else {
                    alert("驗證失敗：帳號或密碼錯誤！");
                }
            } catch (error) {
                alert("登入失敗：" + error.message);
            }
        }

        function downloadAssetTemplate() {
            const csvContent = "\uFEFF資產碼,設備名稱,資產性質,設備狀態,設備地點,保管人/部門,採購單號,資產價值,採購日期,保修到期日,預計更換日期,備註\n" +
                               "\"AST-001\",\"行政部 辦公桌\",\"辦公傢俱\",\"正常\",\"3樓行政辦公室\",\"行政部\",\"PO20260101\",1500,\"2026-01-01\",\"2029-01-01\",\"2031-01-01\",\"全新採購範例\"\n" +
                               "\"AST-002\",\"總務部 筆記型電腦\",\"IT設備\",\"正常\",\"2樓總務課\",\"張三\",\"PO20260215\",8500,\"2026-02-15\",\"2028-02-15\",\"2030-02-15\",\"包含常用軟體\"";
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "總務部設備批次匯入範本.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function parseCsvLine(line) {
            const result = []; let current = ""; let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') {
                    if (inQuotes && line[i + 1] === '"') { current += '"'; i++; } else { inQuotes = !inQuotes; }
                } else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ""; } 
                else { current += ch; }
            }
            result.push(current.trim()); return result;
        }

        async function importAssets() {
            const btn = document.getElementById('btn-import');
            const fileInput = document.getElementById('csv-file');
            const status = document.getElementById('import-status');
            if (!fileInput.files || fileInput.files.length === 0) return alert("請先選擇 CSV 檔案");

            try {
                btn.disabled = true; btn.innerText = "資料處裡中...";
                status.style.color = "var(--text)"; status.innerText = "正在解析上傳的 CSV 檔案...";

                const text = await fileInput.files[0].text();
                const lines = text.replace(/\r/g, "").split("\n").map(l => l.trim()).filter(Boolean);
                if (lines.length < 2) throw new Error("CSV 檔案內容不足或缺少標題列");

                const updateTime = getCurrentTimeStr();

                const rows = lines.slice(1).map((line, idx) => {
                    const cols = parseCsvLine(line);
                    if (cols.length < 1 || !cols[0]) throw new Error(`第 ${idx + 2} 行缺少必填的「資產碼」欄位`);
                    
                    return {
                        AssetCode: cols[0],
                        AssetName: cols[1] || "",
                        AssetType: cols[2] || "IT設備",
                        Status: cols[3] || "正常",
                        Location: cols[4] || "",
                        Custodian: cols[5] || "",
                        PO_Number: cols[6] || "",
                        AssetValue: cols[7] ? parseFloat(cols[7]) : null,
                        PurchaseDate: cols[8] || null,
                        WarrantyDate: cols[9] || null,
                        ReplacementDate: cols[10] || null,
                        Notes: cols[11] || "",
                        LastUpdated: updateTime // 批次匯入時統一打上時間戳
                    };
                });

                status.innerText = `解析成功！正在發送 ${rows.length} 筆資料至資料庫...`;
                await nocoInsertMany(NOCODB_CONFIG.tables.assets, rows);
                
                status.style.color = "var(--success)";
                status.innerText = `🎉 匯入成功！共新增 ${rows.length} 筆設備資產資料。`;
                fileInput.value = "";
            } catch (error) {
                status.style.color = "var(--danger)";
                status.innerText = "❌ 匯入失敗原因：" + error.message;
            } finally {
                btn.disabled = false; btn.innerText = "上傳並匯入至 NocoDB";
            }
        }

        async function exportAssets() {
            const btn = document.getElementById('btn-export');
            try {
                btn.disabled = true; btn.innerText = "連線讀取資料庫中...";

                const res = await nocoApi('GET', NOCODB_CONFIG.tables.assets, '?limit=1000');
                const list = res.list || res.records || [];
                if (list.length === 0) return alert("目前資料庫中尚無任何設備記錄。");

                let csvContent = "\uFEFF資產碼,設備名稱,資產性質,設備狀態,設備地點,保管人/部門,採購單號,資產價值,採購日期,保修到期日,預計更換日期,備註,資料更新日期\n";
                list.forEach(r => {
                    const code = r.AssetCode || ""; const name = r.AssetName || "";
                    const type = r.AssetType || ""; const status = r.Status || "";
                    const loc = r.Location || ""; const custodian = r.Custodian || "";
                    const po = r.PO_Number || ""; const val = r.AssetValue || "";
                    const pDate = r.PurchaseDate ? r.PurchaseDate.substring(0,10) : "";
                    const wDate = r.WarrantyDate ? r.WarrantyDate.substring(0,10) : "";
                    const rDate = r.ReplacementDate ? r.ReplacementDate.substring(0,10) : "";
                    const notes = (r.Notes || "").replace(/"/g, '""'); 
                    const upd = r.LastUpdated || "";
                    
                    csvContent += `"${code}","${name}","${type}","${status}","${loc}","${custodian}","${po}","${val}","${pDate}","${wDate}","${rDate}","${notes}","${upd}"\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.setAttribute("download", `總務部設備資產清單_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            } catch (error) {
                alert("設備資料匯出失敗：" + error.message);
            } finally {
                btn.disabled = false; btn.innerText = "📤 下載完整 CSV 設備清單";
            }
        }

        async function loadOverview(page) {
            if (page < 1) return;
            currentPage = page;
            const tbody = document.getElementById('overview-tbody');
            const keyword = document.getElementById('overview-search-keyword').value.trim();
            tbody.innerHTML = '<tr><td colspan="13" style="text-align:center; padding: 30px;">系統資料載入中，請稍候...</td></tr>';
            
            try {
                const offset = (currentPage - 1) * PAGE_SIZE;
                let query = `?limit=${PAGE_SIZE}&offset=${offset}`;
                if (keyword) {
                    const whereClause = `(AssetCode,like,%${keyword}%)~or(AssetName,like,%${keyword}%)~or(Location,like,%${keyword}%)~or(Custodian,like,%${keyword}%)`;
                    query += `&where=${encodeURIComponent(whereClause)}`;
                }
                
                const res = await nocoApi('GET', NOCODB_CONFIG.tables.assets, query);
                const list = res.list || res.records || [];
                let totalRecords = 0; let totalPages = 1;
                
                if (res.pageInfo && res.pageInfo.totalRows !== undefined) {
                    totalRecords = res.pageInfo.totalRows;
                    totalPages = Math.max(1, Math.ceil(totalRecords / PAGE_SIZE));
                } else {
                    totalRecords = (currentPage - 1) * PAGE_SIZE + list.length;
                    totalPages = list.length === PAGE_SIZE ? currentPage + 1 : currentPage;
                }
                
                if (list.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="13" style="text-align:center; padding: 30px; color: var(--danger); font-weight: bold;">找不到符合條件的設備</td></tr>`;
                } else {
                    tbody.innerHTML = '';
                    list.forEach(asset => {
                        let statusClass = "status-normal";
                        if(asset.Status === '維修中') statusClass = "status-maintenance";
                        if(asset.Status === '報廢') statusClass = "status-scrapped";

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="font-weight: 600;" class="nowrap">${asset.AssetCode || '-'}</td>
                            <td class="nowrap">${asset.AssetName || '-'}</td>
                            <td class="nowrap">${asset.AssetType || '-'}</td>
                            <td style="text-align: center;"><span class="status-badge ${statusClass}">${asset.Status || '-'}</span></td>
                            <td class="nowrap">${asset.Location || '-'}</td>
                            <td class="nowrap">${asset.Custodian || '-'}</td>
                            <td class="nowrap">${asset.PO_Number || '-'}</td>
                            <td class="nowrap">${asset.AssetValue !== null && asset.AssetValue !== undefined ? asset.AssetValue : '-'}</td>
                            <td class="nowrap">${asset.PurchaseDate ? asset.PurchaseDate.substring(0,10) : '-'}</td>
                            <td class="nowrap">${asset.ReplacementDate ? asset.ReplacementDate.substring(0,10) : '-'}</td>
                            <td><span class="truncate-text" title="${asset.Notes || ''}">${asset.Notes || '-'}</span></td>
                            <td class="nowrap" style="color: var(--text-light); font-size: 0.9em;">${asset.LastUpdated || '-'}</td>
                            <td style="text-align: center; position: sticky; right: 0; background: rgba(255, 255, 255, 0.95); z-index: 1;">
                                <button onclick="editAssetFromOverview('${asset.AssetCode}')" style="padding: 6px 12px; font-size: 13px; box-shadow:none;">編輯</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
                document.getElementById('overview-page-info').innerText = `目前第 ${currentPage} 頁 / 共 ${totalPages} 頁 (總計 ${totalRecords} 筆)`;
                document.getElementById('btn-prev-page').disabled = (currentPage === 1);
                document.getElementById('btn-next-page').disabled = (currentPage >= totalPages);
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="13" style="text-align:center; padding: 30px; color: var(--danger);">資料載入失敗：${error.message}</td></tr>`;
            }
        }

        function editAssetFromOverview(code) {
            showSection('admin-manage-section');
            document.getElementById('admin-search-code').value = code;
            queryAsset('admin');
        }

        async function queryAsset(role) {
            const inputId = role === 'staff' ? 'staff-search-code' : 'admin-search-code';
            const code = document.getElementById(inputId).value.trim();
            if (!code) return alert("請輸入資產碼！");

            try {
                const queryFilter = `?where=(AssetCode,eq,${encodeURIComponent(code)})`;
                const res = await nocoApi('GET', NOCODB_CONFIG.tables.assets, queryFilter);
                
                if (!res.list || res.list.length === 0) {
                    alert(`找不到資產碼為 [${code}] 的設備資料。`);
                    if(role === 'admin') clearForm(code);
                    return;
                }
                const asset = res.list[0];
                if (role === 'staff') renderStaffView(asset);
                else fillAdminForm(asset);
            } catch (error) {
                alert("查詢發生錯誤：" + error.message);
            }
        }

        function renderStaffView(asset) {
            const container = document.getElementById('staff-result');
            container.classList.remove('hidden');
            let statusClass = "status-normal";
            if(asset.Status === '維修中') statusClass = "status-maintenance";
            if(asset.Status === '報廢') statusClass = "status-scrapped";

            container.innerHTML = `
                <div style="text-align:center; margin-bottom: 20px;">
                    <h3 style="margin:0 0 10px 0; color: var(--primary); font-size: 1.4em;">${asset.AssetName || '未知設備'}</h3>
                    <span class="status-badge ${statusClass}">${asset.Status || '未知狀態'}</span>
                </div>
                <div class="data-row"><div class="data-label">資產碼</div><div class="data-value">${asset.AssetCode || '-'}</div></div>
                <div class="data-row"><div class="data-label">資產性質</div><div class="data-value">${asset.AssetType || '-'}</div></div>
                <div class="data-row"><div class="data-label">設備地點</div><div class="data-value">${asset.Location || '-'}</div></div>
                <div class="data-row"><div class="data-label">保管人/部門</div><div class="data-value">${asset.Custodian || '-'}</div></div>
                <div class="data-row"><div class="data-label">保修到期日</div><div class="data-value">${asset.WarrantyDate ? asset.WarrantyDate.substring(0,10) : '-'}</div></div>
                <div class="data-row"><div class="data-label">資料更新</div><div class="data-value" style="color: var(--primary); font-size: 0.9em;">${asset.LastUpdated || '-'}</div></div>
                <div class="data-row"><div class="data-label">備註事項</div><div class="data-value" style="font-size: 0.9em; color: var(--text-light);">${asset.Notes || '無'}</div></div>
            `;
        }

        function fillAdminForm(asset) {
            document.getElementById('form-record-id').value = asset.Id || asset.id || '';
            document.getElementById('f-code').value = asset.AssetCode || '';
            document.getElementById('f-name').value = asset.AssetName || '';
            document.getElementById('f-type').value = asset.AssetType || 'IT設備';
            document.getElementById('f-status').value = asset.Status || '正常';
            document.getElementById('f-location').value = asset.Location || '';
            document.getElementById('f-custodian').value = asset.Custodian || '';
            document.getElementById('f-po').value = asset.PO_Number || '';
            document.getElementById('f-value').value = asset.AssetValue || '';
            document.getElementById('f-purchase-date').value = asset.PurchaseDate ? asset.PurchaseDate.substring(0,10) : '';
            document.getElementById('f-warranty-date').value = asset.WarrantyDate ? asset.WarrantyDate.substring(0,10) : '';
            document.getElementById('f-replace-date').value = asset.ReplacementDate ? asset.ReplacementDate.substring(0,10) : '';
            document.getElementById('f-notes').value = asset.Notes || '';
            document.getElementById('f-last-updated').value = asset.LastUpdated || '-';
            showMessage('資料已載入，可進行編輯', 'var(--primary)');
        }

        function clearForm(code = '') {
            document.getElementById('form-record-id').value = '';
            document.getElementById('f-code').value = code;
            document.getElementById('f-name').value = '';
            document.getElementById('f-type').value = 'IT設備';
            document.getElementById('f-status').value = '正常';
            document.getElementById('f-location').value = '';
            document.getElementById('f-custodian').value = '';
            document.getElementById('f-po').value = '';
            document.getElementById('f-value').value = '';
            document.getElementById('f-purchase-date').value = '';
            document.getElementById('f-warranty-date').value = '';
            document.getElementById('f-replace-date').value = '';
            document.getElementById('f-notes').value = '';
            document.getElementById('f-last-updated').value = '系統將於儲存時自動產生';
            showMessage('準備新增設備', 'var(--text-light)');
        }

        async function saveAsset() {
            const btn = document.getElementById('btn-save');
            const recordId = document.getElementById('form-record-id').value;
            const updateTime = getCurrentTimeStr();
            
            const payload = {
                AssetCode: document.getElementById('f-code').value.trim(),
                AssetName: document.getElementById('f-name').value.trim(),
                AssetType: document.getElementById('f-type').value,
                Status: document.getElementById('f-status').value,
                Location: document.getElementById('f-location').value.trim(),
                Custodian: document.getElementById('f-custodian').value.trim(),
                PO_Number: document.getElementById('f-po').value.trim(),
                AssetValue: parseFloat(document.getElementById('f-value').value) || null,
                PurchaseDate: document.getElementById('f-purchase-date').value || null,
                WarrantyDate: document.getElementById('f-warranty-date').value || null,
                ReplacementDate: document.getElementById('f-replace-date').value || null,
                Notes: document.getElementById('f-notes').value.trim(),
                LastUpdated: updateTime // 👈 每次按下儲存，覆寫新的時間戳
            };
            if (!payload.AssetCode) return alert("資產碼為必填欄位！");

            try {
                btn.disabled = true;
                btn.innerText = "儲存中...";
                if (recordId) {
                    payload.Id = recordId;
                    await nocoApi('PATCH', NOCODB_CONFIG.tables.assets, "", [payload]);
                    document.getElementById('f-last-updated').value = updateTime;
                    showMessage('✅ 更新成功！', 'var(--success)');
                } else {
                    await nocoApi('POST', NOCODB_CONFIG.tables.assets, "", [payload]);
                    document.getElementById('f-last-updated').value = updateTime;
                    showMessage('✅ 新增成功！', 'var(--success)');
                }
            } catch (error) {
                showMessage('❌ 儲存失敗：' + error.message, 'var(--danger)');
            } finally {
                btn.disabled = false;
                btn.innerText = "儲存資料";
            }
        }

        function showMessage(text, color) {
            const msg = document.getElementById('save-msg');
            msg.innerText = text; msg.style.color = color;
            setTimeout(() => { msg.innerText = ''; }, 5000);
        }
    </script>
</body>
</html>
